name: EOD Report On Logout

on:
  workflow_dispatch:
    inputs:
      user_id:
        description: Supabase user ID
        required: true
        type: string
      date:
        description: Date in YYYY-MM-DD format
        required: true
        type: string

jobs:
  run-eod:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write GCP credentials
        run: echo '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}' > /tmp/service_account.json

      - name: Run EOD for user
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/service_account.json
          ADMIN_SERVER_URL: ${{ secrets.ADMIN_SERVER_URL }}
          PUSH_API_KEY: ${{ secrets.PUSH_API_KEY }}
          EMPLOYEE_ROLE: ${{ secrets.EMPLOYEE_ROLE }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: >
          python3 backend/worker.py
          --user-id "${{ inputs.user_id }}"
          --date "${{ inputs.date }}"
          --eod-only
