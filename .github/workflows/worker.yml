name: TimeTracker AI Worker

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  run-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write GCP credentials
        run: echo '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}' > /tmp/service_account.json

      - name: Run worker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/service_account.json
          CLICKUP_TOKEN: ${{ secrets.CLICKUP_TOKEN }}
          CLICKUP_TEAM_ID: ${{ secrets.CLICKUP_TEAM_ID }}
          CLICKUP_USER_EMAIL: ${{ secrets.CLICKUP_USER_EMAIL }}
          EOD_CLICKUP_CHANNEL_ID: ${{ secrets.EOD_CLICKUP_CHANNEL_ID }}
          ADMIN_SERVER_URL: ${{ secrets.ADMIN_SERVER_URL }}
          PUSH_API_KEY: ${{ secrets.PUSH_API_KEY }}
          EMPLOYEE_ROLE: ${{ secrets.EMPLOYEE_ROLE }}
        run: python3 backend/worker.py

